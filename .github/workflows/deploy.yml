name: CI/CD Pipeline - Enterprise Deploy

on:
  push:
    branches: [ "main" ] # Déclenche la pipeline au push sur main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code du dépôt
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configurer Java (comme sur le serveur de build de l'entreprise)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Cache les dépendances pour que ça aille plus vite

    # 3. Compiler et Tester l'application Spring Boot
    - name: Build with Maven
      run: mvn clean package -DskipTests # On passe les tests pour aller vite, mais en entreprise on les laisse !

    # 4. Connexion sécurisée à Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Build de l'image Docker et Push
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mini-microservice:latest

    # 6. Déploiement automatique sur Render
    - name: Deploy to Render
      run: |
        curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"