name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  # Feedback rapide sur chaque push (feature branches incluses), avant même l'ouverture d'une PR
  unit-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run unit tests
      run: mvn clean test

  # Gate de merge : tourne sur la PR elle-même (feature->develop ou develop->main)
  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run unit + integration tests
      run: mvn test -P integration-tests

  # Déploiement : uniquement après un push (donc un merge) sur main
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build artifact
      run: mvn clean package -DskipTests

    - name: Deploy
      run: echo "Deploying to production..."
      # Ajoute ici tes commandes de déploiement réelles
