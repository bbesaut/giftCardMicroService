# Logging - Production
logging.level.root=WARN
logging.level.com.finovago.p2p=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.web.context.request.async=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.io.jsonwebtoken=WARN

logging.file.name=logs/p2p.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId}] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId}] - %msg%n

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION}
application.security.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway - prod DB already has data; baseline it at V1 instead of trying to (re)create existing tables
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Swagger/OpenAPI disabled in production
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

loki.username=${GRAFANA_LOKI_USER}
loki.password=${GRAFANA_LOKI_TOKEN}

