# Logging - Test
logging.level.root=WARN
logging.level.com.finovago.p2p=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId}] - %msg%n

# Database - H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

# Server
server.port=0

#swagger doc
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

application.security.jwt.secret-key=secret_key_for_test_environment_that_is_longer_than_32_characters
application.security.jwt.access-token-expiration=900000
application.security.jwt.refresh-token-expiration=604800000