# Logging
logging.level.root=INFO
logging.level.com.finovago.p2p=DEBUG
logging.level.org.springframework.web=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId}] - %msg%n

# Database - PostgreSQL running locally via docker-compose (see docker-compose.yml)
spring.datasource.url=jdbc:postgresql://localhost:5432/p2p_dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=p2p
spring.datasource.password=p2p
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

loki4j.enabled=false

# Server
server.port=8080

#swagger doc
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

application.security.jwt.secret-key=${JWT_SECRET_KEY:secret_key_for_dev_environment_that_is_longer_than_32_characters}
application.security.jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:900000}
application.security.jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}