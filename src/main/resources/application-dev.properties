# Logging
logging.level.root=INFO
logging.level.com.finovago.p2p=DEBUG
logging.level.org.springframework.web=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId}] - %msg%n

# Database - H2 in-memory for development (no setup needed)
spring.datasource.url=jdbc:h2:mem:p2p_dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

loki4j.enabled=false

# H2 Console (optional, access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Server
server.port=8080

#swagger doc
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

application.security.jwt.secret-key=${JWT_SECRET_KEY:secret_key_for_dev_environment_that_is_longer_than_32_characters}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}